<section class="section reading-section">
    <h1>Reading</h1>

    <!-- Currently Reading Showcase -->
    <div class="current-reads">
        <h2>Currently Reading</h2>
        <div class="book-showcase">
            <!-- Example Book Cards - Replace with your books -->
            <div class="book-card">
                <div class="book-cover">
                    <img src="images/books/one_golden_summer.jpg" alt="Book Cover 1">
                    <div class="reading-progress">
                        <div class="progress-bar" style="width: 65%"></div>
                    </div>
                </div>
                <div class="book-info">
                    <h3 class="book-title">One Golden Summer</h3>
                    <p class="book-author">Carley Fortune</p>
                    <span class="reading-status">65% Complete</span>
                </div>
            </div>
            <!-- Add more current books as needed -->
        </div>
    </div>

    <!-- Reading Lists -->
    <div class="reading-lists">
        <!-- Completed Books -->
        <div class="book-list completed">
            <h2>Recently Completed</h2>
            <div class="book-grid">
                <!-- Example Completed Book -->
                <div class="book-card completed">
                    <div class="book-cover">
                        <img src="images/books/normal_people.jpg" alt="Book Cover 2">
                        <div class="completion-badge">
                            <i class="fas fa-check"></i>
                        </div>
                    </div>
                    <div class="book-info">
                        <h3 class="book-title">Normal People</h3>
                        <p class="book-author">Salley Rooney</p>
                        <span class="completion-date">Completed: August 2024</span>
                    </div>
                </div>
                <!-- Add more completed books -->
            </div>
        </div>

        <!-- Reading List / Want to Read -->
        <div class="book-list want-to-read">
            <h2>Want to Read</h2>
            <div class="book-grid">
                <!-- Example Want to Read Book -->
                <div class="book-card future">
                    <div class="book-cover">
                        <img src="images/books/where_the_crawdads_sing.jpg" alt="Book Cover 3">
                    </div>
                    <div class="book-info">
                        <h3 class="book-title">Where the Crawdads Sing</h3>
                        <p class="book-author">Delia Owens</p>
                    </div>
                </div>
                <!-- Add more future reads -->
            </div>
        </div>
    </div>
</section>
