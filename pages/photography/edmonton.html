<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edmonton Photography - Willy Zuo</title>
    <link rel="stylesheet" href="../../styles/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">Willy Zuo</div>
        <button class="nav-toggle" aria-label="toggle navigation">
            <span class="hamburger"></span>
        </button>
        <ul class="nav-menu">
            <li><a href="../../pages/about.html" class="nav-link" data-page="about">About Me</a></li>
            <li><a href="../../pages/projects.html" class="nav-link" data-page="projects">Projects</a></li>
            <li><a href="../../pages/photography.html" class="nav-link active" data-page="photography">Photography</a></li>
            <li><a href="../../pages/reading.html" class="nav-link" data-page="reading">Reading</a></li>
            <li><a href="../../pages/blog.html" class="nav-link" data-page="blog">Blog</a></li>
        </ul>
    </nav>

    <main id="content">
        <section class="section photography-section">
            <h1>Edmonton Photography</h1>
            <div class="breadcrumb">
                <a href="../photography.html">Photography</a> > Edmonton
            </div>

            <!-- Category filters -->
            <div class="category-filters">
                <button class="category-btn active" data-category="all">All</button>
                <button class="category-btn" data-category="downtown">Downtown</button>
                <button class="category-btn" data-category="Garneau Community">Garneau Community</button>
                <button class="category-btn" data-category="campus">Campus</button>
                <button class="category-btn" data-category="landmarks">Landmarks</button>
            </div>
            
            <div class="photo-gallery">
                <!-- Downtown Category -->
                <div class="photo-category" id="downtown">
                    <div class="photo-item" data-category="downtown">
                        <img src="../../images/photography/edmonton/downtown1.jpg" alt="Downtown Edmonton Skyline">
                        <div class="photo-info">
                            <h3>Downtown Skyline</h3>
                            <p>A view of Edmonton's downtown skyline during sunset</p>
                            <div class="photo-metadata">
                                <span class="date">Date: 2024</span>
                                <span class="location">Location: Downtown Edmonton</span>
                            </div>
                        </div>
                    </div>
                    <!-- Add more downtown photos here -->
                </div>

                <!-- River Valley Category -->
                <div class="photo-category" id="Garneau Community">
                    <div class="photo-item" data-category="Garneau Community">
                        <img src="../../images/photography/edmonton/yeg1.JPG" alt="Garneau Community">
                        <div class="photo-info">
                            <div class="photo-metadata">
                                <span class="date">Date: 2025</span>
                            </div>
                        </div>
                    </div>
                    <!-- Add more river valley photos here -->

                    <div class="photo-item" data-category="Garneau Community">
                        <img src="../../images/photography/edmonton/yeg2.JPG" alt="Garneau Community">
                        <div class="photo-info">
                            <div class="photo-metadata">
                                <span class="date">Date: 2025</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Template for adding new photos:
                <div class="photo-item" data-category="category-name">
                    <img src="../../images/photography/edmonton/image-name.jpg" alt="Image Description">
                    <div class="photo-info">
                        <h3>Photo Title</h3>
                        <p>Photo Description</p>
                        <div class="photo-metadata">
                            <span class="date">Date: YYYY</span>
                            <span class="location">Location: Specific Location</span>
                        </div>
                    </div>
                </div>
                -->
            </div>

            <!-- Lightbox for photo viewing -->
            <div class="lightbox" id="photoLightbox">
                <span class="lightbox-close">&times;</span>
                <img class="lightbox-content" id="lightboxImage">
                <div class="lightbox-caption">
                    <h3 id="lightboxTitle"></h3>
                    <p id="lightboxDescription"></p>
                    <div class="lightbox-metadata">
                        <span id="lightboxDate"></span>
                        <span id="lightboxLocation"></span>
                    </div>
                </div>
                <button class="lightbox-nav prev">&lt;</button>
                <button class="lightbox-nav next">&gt;</button>
            </div>
        </section>
    </main>

    <script src="../../scripts/main.js"></script>
    <script src="../../scripts/photography.js"></script>
</body>
</html>
